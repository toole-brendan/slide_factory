schema_version: 1

# Inert human/agent navigation file — a faceted visual-grammar index.
# The build pipeline does NOT parse this file; deck_core._build reads each slide
# module's render(), LAYOUT, CHARTS, IMAGES, HYPERLINKS directly. This index
# exists only so a future agent can find the right exemplar to study by the
# copyable slide mechanics it demonstrates.
#
# Navigate by tags, not categories: the tags are namespaced facets
# (chart: / layout: / table: / flow: / annotation:), not mutually exclusive
# categories. Within each slide, tags are ordered most-useful-first
# (dominant layout/exhibit, then chart/table/flow mechanics, then overlays).
#
# Slide ids are the cleaned module stems (file stem == id).

visual_grammar_allowed:
  # chart primitives and chart encodings
  - "chart:native_area"
  - "chart:native_bar"
  - "chart:native_bubble"
  - "chart:native_column"
  - "chart:native_combo"
  - "chart:stacked_column"
  - "chart:clustered_bar"
  - "chart:negative_values"
  - "chart:single_category_stack"
  - "chart:percentage_normalized_stack"
  - "chart:dual_axis"
  - "chart:line_overlay"
  - "chart:waterfall_like"
  - "chart:hidden_offset_series"
  - "chart:bubble_size_encoding"
  - "chart:point_level_colors"
  - "chart:pattern_fill_series"
  - "chart:small_multiples"
  - "chart:manual_plot_border_patch"

  # macro slide layouts
  - "layout:dominant_chart"
  - "layout:chart_only"
  - "layout:chart_plus_table"
  - "layout:chart_plus_right_rail"
  - "layout:chart_plus_assumptions"
  - "layout:chart_plus_kpi_cards"
  - "layout:diagram_plus_table"
  - "layout:full_slide_table"
