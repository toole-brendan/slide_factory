    visual_grammar: ["layout:left_criteria_right_rationale", "flow:scope_filter", "table:native_table", "annotation:color_keys", "table:section_rules"]

  - id: approach_unit_economics
    visual_grammar: ["layout:full_slide_table", "table:native_table", "table:matrix", "table:row_spans", "table:grid_spans", "table:local_helpers", "table:section_rules", "annotation:dashed_callouts", "annotation:color_keys"]

  - id: approach_volume_and_price
