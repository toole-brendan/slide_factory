  - "table:reference_table"
  - "table:methodology_table"
  - "table:glossary_tables"
  - "table:two_column_terms"
  - "table:one_cell_narrative"
  - "table:matrix"
  - "table:source_map"
  - "table:row_spans"
  - "table:grid_spans"
  - "table:merged_commentary_cell"
  - "table:rich_cell_bullets"
  - "table:local_helpers"
  - "table:rotated_spines"
  - "table:section_rules"
  - "table:full_width"

  # diagram and flow grammars
  - "flow:scope_filter"
  - "flow:nested_funnel"
  - "flow:approach_rail"
  - "flow:calculation_nodes"
  - "flow:operator_glyphs"
  - "flow:parallel_tracks"
  - "flow:repeat_frames"
  - "flow:connectors"
  - "flow:mission_grid"
  - "flow:allocation_filters"
  - "flow:braces_grouping"
  - "flow:swimlanes"
  - "flow:money_flow"
  - "flow:value_chain_map"
  - "flow:logo_matrix"

  # manual overlays, legends, and annotations
  - "annotation:manual_axis_labels"
  - "annotation:manual_data_labels"
  - "annotation:external_legend"
  - "annotation:color_keys"
  - "annotation:pattern_keys"
  - "annotation:line_rule_keys"
  - "annotation:bubble_size_key"
  - "annotation:callouts"
  - "annotation:wedge_callouts"
  - "annotation:dashed_callouts"
  - "annotation:ring_callouts"
  - "annotation:shaded_band"
  - "annotation:phase_rules"
  - "annotation:summary_badges"
  - "annotation:scenario_chip"
  - "annotation:source_hotspots"
  - "annotation:off_house_source_note"
  - "annotation:hyperlinked_source_note"
  - "annotation:status_icons"
  - "annotation:kpi_cards"
  - "annotation:metric_badges"
  - "annotation:threshold_marker"
  - "annotation:takeaway_banner"
  - "annotation:logo_slots"

slides:
